ingress:
  host: chart-example.local
  ingressClassName: nginx

gitRepository: laszlocph/demo-app
gitSha: xyz


volumes:
  - name: testing
    path: /deleteme
    hostPath:
      path: /deleteme
  - name: empty
    path: /deleteme2
    emptyDir: true
  - name: volume-name
    existingSecret: my-secret
    path: /randomPath/app.creds
    subPath: app.creds

vars:
  var1: value1
  var2: value2

probe:
  enabled: true
  settings:
    periodSeconds: 30

podSpec:
  hostNetwork: true

cnpg:
  enabled: false

  cluster:
    instances: 3
    storage:
      size: 5Gi
      storageClass: external-nfs
    walStorage:
      size: 2Gi
      storageClass: external-nfs

  postgresAuth:
    username: 
    password: 

  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      endpointURL: https://seaweedfs-admin.mea-poc.opsta.in.th/buckets/
      s3Credentials:
        accessKeyValue: 
        secretKeyValue: 
  bootstrap:
    initdb: 
      database: cnpg
      owner: cnpg
